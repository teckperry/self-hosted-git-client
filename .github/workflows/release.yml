name: Release

# Build installers for macOS, Windows and Linux and attach them to a GitHub
# Release. Triggered by pushing a version tag (e.g. `v0.1.0`); the release is
# published automatically with the installers so every tag has a full Release.
# `workflow_dispatch` lets you dry-run the builds (artifacts only, no release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Separate arm64/x64 (not --universal): the ad-hoc afterPack signing
          # gives the two arch builds different signatures, which breaks the
          # universal merge (identical-SHA requirement).
          - os: macos-latest
            eb: --mac --arm64 --x64
            artifacts: |
              dist/*.dmg
              dist/*.zip
          - os: windows-latest
            eb: --win
            artifacts: |
              dist/*.exe
          - os: ubuntu-latest
            eb: --linux
            artifacts: |
              dist/*.AppImage
              dist/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # --publish never: we upload/release ourselves in the `release` job below.
      - run: npx electron-builder ${{ matrix.eb }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  release:
    needs: build
    # Only publish a release for tag pushes (dry-runs just leave artifacts).
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          # Publish immediately so the tag always has a full Release with the
          # OS installers attached (a bare tag only exposes source-code zips).
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
